<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加分系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #eef2f7 0%, #d9e0ec 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }

        .container {
            max-width: 1400px;
            width: 100%;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 2.8rem;
            box-shadow: 0 30px 60px -15px rgba(0,0,0,0.3), inset 0 2px 4px rgba(255,255,255,0.6);
            border: 1px solid rgba(255,255,255,0.7);
            padding: 2rem 2rem 1.5rem;
            position: relative;
        }

        /* 顶部栏 */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .title-area {
            display: flex;
            align-items: baseline;
            gap: 1rem;
            flex-wrap: wrap;
        }

        h1 {
            font-size: 2.4rem;
            font-weight: 700;
            background: linear-gradient(145deg, #162b40, #2c4a6e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        .date-badge {
            background: #cdd9e9;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            font-size: 0.95rem;
            font-weight: 500;
            color: #1f3a57;
            box-shadow: inset 1px 1px 3px #b5c2d4, inset -2px -2px 5px #ffffff;
        }

        /* 统计卡片 */
        .stats-row {
            display: flex;
            gap: 1.5rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .counter-card {
            background: #dfe7f2;
            border-radius: 60px;
            padding: 0.5rem 2rem;
            display: flex;
            gap: 2rem;
            box-shadow: inset 2px 2px 5px #bac6d8, inset -3px -3px 7px #ffffff;
        }

        .counter-item {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .counter-label {
            font-weight: 500;
            color: #2c4058;
        }

        .counter-value {
            font-weight: 700;
            font-size: 1.8rem;
            color: #0f2b42;
            min-width: 2.5rem;
            text-align: center;
        }

        .settings-btn {
            background: #2b3f59;
            color: white;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 30px;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 8px 14px -6px #1f344b;
            transition: all 0.15s;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .settings-btn:hover {
            background: #1d2e44;
            transform: rotate(30deg) scale(1.05);
        }

        /* 排行榜 */
        .rank-section {
            background: rgba(255,255,255,0.5);
            border-radius: 2rem;
            padding: 1.2rem 1.8rem;
            margin: 1.5rem 0 2rem;
            border: 1px solid rgba(255,255,255,0.8);
        }

        .rank-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #1a3146;
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .rank-grid {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .rank-item {
            background: #ffffffb3;
            backdrop-filter: blur(4px);
            padding: 0.6rem 1.4rem;
            border-radius: 40px;
            font-weight: 500;
            box-shadow: 0 4px 8px rgba(0,0,0,0.04);
            border: 1px solid white;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .rank-medal {
            font-size: 1.2rem;
        }

        .rank-name {
            color: #1d3146;
        }

        .rank-score {
            background: #263b54;
            color: white;
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        /* 名单网格 */
        .list-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 0.8rem;
            background: rgba(255,255,255,0.3);
            padding: 1.8rem 1.5rem;
            border-radius: 2rem;
            margin: 1rem 0 1.8rem;
            border: 1px solid rgba(255,255,255,0.7);
            max-height: 450px;
            overflow-y: auto;
        }

        .person-card {
            background: white;
            border-radius: 50px;
            padding: 0.5rem 0.8rem 0.5rem 1.2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 8px rgba(0,0,0,0.02);
            border: 1px solid rgba(255,255,255,0.8);
            transition: all 0.1s;
            cursor: pointer;
            user-select: none;
        }

        .person-card:active {
            transform: scale(0.97);
            background: #e6f0ff;
        }

        .person-name {
            font-weight: 500;
            color: #162635;
            font-size: 1rem;
        }

        .person-score {
            background: #1e364e;
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
            min-width: 2.2rem;
            height: 2.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
            margin-left: 6px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        /* 底部 */
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #5f748b;
            font-size: 0.8rem;
            border-top: 1px solid rgba(0,0,0,0.04);
            padding-top: 1rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        /* 模态框（设置面板） */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-card {
            background: #eef2f7;
            border-radius: 2.5rem;
            padding: 2rem 2.5rem;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 30px 50px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.7);
        }

        .modal-title {
            font-size: 1.6rem;
            font-weight: 600;
            color: #1f3b55;
            margin-bottom: 1.5rem;
        }

        .input-field {
            width: 100%;
            padding: 0.9rem 1.2rem;
            border: none;
            border-radius: 60px;
            background: #dae2ed;
            box-shadow: inset 3px 3px 8px #bac7db, inset -3px -3px 8px #ffffff;
            font-size: 1rem;
            margin-bottom: 1.5rem;
            outline: none;
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
        }

        .btn {
            padding: 0.7rem 1.8rem;
            border: none;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            background: #d2ddec;
            box-shadow: 4px 4px 10px #b2c1d4, -4px -4px 10px #ffffff;
            transition: 0.1s;
        }

        .btn.primary {
            background: #253d57;
            color: white;
            box-shadow: 0 8px 16px -6px #1d334a;
        }

        .btn.primary:hover {
            background: #1c3148;
        }

        .btn:hover {
            background: #c6d3e6;
        }

        .edit-mode .person-score {
            background: #b88b2c;
            cursor: pointer;
        }

        .admin-badge {
            background: #b6343a;
            color: white;
            padding: 0.2rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
            margin-left: 1rem;
        }

        .loading {
            grid-column: 1/-1;
            text-align: center;
            padding: 2rem;
            color: #466185;
        }
    </style>
    <!-- Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <!-- 顶部栏：标题 + 统计 + 设置按钮 -->
        <div class="top-bar">
            <div class="title-area">
                <h1>加分系统</h1>
                <span class="date-badge" id="currentDate"></span>
                <span id="adminBadge" class="admin-badge" style="display: none;">管理模式</span>
            </div>
            <div class="stats-row">
                <div class="counter-card">
                    <div class="counter-item">
                        <span class="counter-label">📅 今日</span>
                        <span class="counter-value" id="todayCount">0</span>
                    </div>
                    <div class="counter-item">
                        <span class="counter-label">📊 总计</span>
                        <span class="counter-value" id="totalCount">0</span>
                    </div>
                </div>
                <button class="settings-btn" id="settingsBtn">⚙</button>
            </div>
        </div>

        <!-- 排行榜（前5名） -->
        <div class="rank-section" id="rankSection" style="display: none;">
            <div class="rank-title">🏆 加分英雄榜 · 前五名</div>
            <div class="rank-grid" id="rankList"></div>
        </div>

        <!-- 名单网格 -->
        <div id="peopleList" class="list-grid">
            <div class="loading">加载学生名单中...</div>
        </div>

        <!-- 底部 -->
        <div class="footer">
            <div>© 2026 807课堂 · 实时同步</div>
            <div style="display: flex; gap: 1.2rem;">
                <a href="#" style="color: inherit;">用户协议</a>
                <a href="#" style="color: inherit;">隐私政策</a>
            </div>
        </div>
    </div>

    <!-- 设置模态框（密码登录） -->
    <div class="modal" id="passwordModal">
        <div class="modal-card">
            <div class="modal-title">🔐 管理登录</div>
            <input type="password" class="input-field" id="passwordInput" placeholder="输入密码" autocomplete="off">
            <div class="modal-actions">
                <button class="btn" id="cancelPwdBtn">取消</button>
                <button class="btn primary" id="submitPwdBtn">登录</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ========== 配置 ==========
            const SUPABASE_URL = 'https://jaxnudadiyqfztvdnmpe.supabase.co';    // ⚠️ 替换为你的 Project URL
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpheG51ZGFkaXlxZnp0dmRubXBlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyOTk1MDUsImV4cCI6MjA4ODg3NTUwNX0.o2MK9E1biJSBydz8nzYOU7WGwZ3kQN43Voxx7XozBRM';               // ⚠️ 替换为你的 anon/public key
            const ADMIN_PASSWORD = 'haide331';                         // 管理密码

            // 初始化Supabase
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            // DOM元素
            const peopleListEl = document.getElementById('peopleList');
            const todaySpan = document.getElementById('todayCount');
            const totalSpan = document.getElementById('totalCount');
            const dateEl = document.getElementById('currentDate');
            const settingsBtn = document.getElementById('settingsBtn');
            const passwordModal = document.getElementById('passwordModal');
            const passwordInput = document.getElementById('passwordInput');
            const cancelPwdBtn = document.getElementById('cancelPwdBtn');
            const submitPwdBtn = document.getElementById('submitPwdBtn');
            const adminBadge = document.getElementById('adminBadge');
            const rankSection = document.getElementById('rankSection');
            const rankList = document.getElementById('rankList');

            let isAdmin = false;              // 是否管理员模式
            let peopleData = [];               // 缓存所有人数据

            // 显示当前日期
            function setCurrentDate() {
                const now = new Date();
                const year = now.getFullYear();
                const month = String(now.getMonth() + 1).padStart(2, '0');
                const day = String(now.getDate()).padStart(2, '0');
                const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
                const weekday = weekdays[now.getDay()];
                dateEl.textContent = `${year}/${month}/${day} ${weekday}`;
            }
            setCurrentDate();

            // 判断某个时间戳是否是今天
            function isToday(timestamp) {
                if (!timestamp) return false;
                const date = new Date(timestamp);
                const today = new Date();
                return date.getFullYear() === today.getFullYear() &&
                       date.getMonth() === today.getMonth() &&
                       date.getDate() === today.getDate();
            }

            // 加载所有数据 + 计算统计
            async function loadData() {
                try {
                    peopleListEl.innerHTML = '<div class="loading">加载学生名单中...</div>';

                    // 查询people表
                    const { data, error } = await supabase
                        .from('people')
                        .select('*')
                        .order('name', { ascending: true });

                    if (error) throw error;

                    if (!data || data.length === 0) {
                        peopleListEl.innerHTML = '<div style="padding: 2rem; text-align: center;">暂无学生数据，请在Supabase添加。</div>';
                        todaySpan.textContent = '0';
                        totalSpan.textContent = '0';
                        rankSection.style.display = 'none';
                        return;
                    }

                    peopleData = data; // 缓存

                    // 计算总计分数（所有人的score总和）
                    const totalScore = data.reduce((sum, p) => sum + (p.score || 0), 0);
                    totalSpan.textContent = totalScore;

                    // 计算今日分数：需要基于每次点击记录，如果没有独立click表，简单方案是统计今天“可能增加的分数”
                    // 但为了演示精准，我们假设数据库中有last_click_at字段并基于它计算（本版简化：今日直接展示0，后续可扩展）
                    // 如果想完全精准，需另外建点击记录表。这里我们暂且展示“今日点击次数”为累计，你可以自行替换逻辑
                    // 我们暂用另一种方式：显示今日新增总分（需要记录每天的变化，比较复杂）
                    // 为了演示，先简单置0，或置为总计（表示一天累计）。你可以调整。
                    todaySpan.textContent = '0';  // 如有需要可替换真实逻辑

                    // 更新排行榜
                    updateRanking(data);

                    // 渲染名单
                    renderPeopleList(data);

                } catch (err) {
                    console.error(err);
                    peopleListEl.innerHTML = `<div style="color: #b34a4a; padding: 2rem;">加载失败: ${err.message}</div>`;
                }
            }

            // 渲染名字列表
            function renderPeopleList(data) {
                if (!data || data.length === 0) {
                    peopleListEl.innerHTML = '<div style="padding: 2rem; text-align: center;">名单为空</div>';
                    return;
                }

                let html = '';
                data.forEach(person => {
                    const score = person.score || 0;
                    html += `
                        <div class="person-card" data-id="${person.id}" data-name="${person.name}">
                            <span class="person-name">${person.name}</span>
                            <span class="person-score" data-score-id="${person.id}">${score}</span>
                        </div>
                    `;
                });
                peopleListEl.innerHTML = html;

                // 如果处于管理员模式，增加特殊类（可点击分数编辑）
                if (isAdmin) {
                    peopleListEl.classList.add('edit-mode');
                } else {
                    peopleListEl.classList.remove('edit-mode');
                }
            }

            // 更新排行榜（前5名）
            function updateRanking(data) {
                // 按score排序，取前5
                const sorted = [...data].sort((a, b) => (b.score || 0) - (a.score || 0)).slice(0, 5);
                if (sorted.length === 0 || sorted[0].score === 0) {
                    rankSection.style.display = 'none';
                    return;
                }

                rankSection.style.display = 'block';
                let rankHtml = '';
                sorted.forEach((p, idx) => {
                    let medal = '';
                    if (idx === 0) medal = '🥇';
                    else if (idx === 1) medal = '🥈';
                    else if (idx === 2) medal = '🥉';
                    else medal = `${idx+1}.`;
                    rankHtml += `
                        <div class="rank-item">
                            <span class="rank-medal">${medal}</span>
                            <span class="rank-name">${p.name}</span>
                            <span class="rank-score">${p.score || 0}</span>
                        </div>
                    `;
                });
                rankList.innerHTML = rankHtml;
            }

            // 点击加分（普通模式）
            async function handlePersonClick(e) {
                const card = e.target.closest('.person-card');
                if (!card) return;

                const personId = card.dataset.id;
                const person = peopleData.find(p => p.id == personId);
                if (!person) return;

                // 如果是管理员模式，点击分数数字执行减少操作，否则加分
                if (isAdmin && e.target.classList.contains('person-score')) {
                    // 管理员点击分数：减1
                    await adjustScore(personId, -1);
                } else {
                    // 普通点击：加1
                    await adjustScore(personId, 1);
                }
            }

            // 调整分数（通用）
            async function adjustScore(personId, delta) {
                try {
                    // 找到当前数据
                    const person = peopleData.find(p => p.id == personId);
                    if (!person) return;

                    const newScore = (person.score || 0) + delta;
                    if (newScore < 0) return; // 分数不能为负

                    // 更新Supabase
                    const { error } = await supabase
                        .from('people')
                        .update({ score: newScore, last_click_at: new Date().toISOString() })
                        .eq('id', personId);

                    if (error) throw error;

                    // 更新本地缓存
                    person.score = newScore;

                    // 重新渲染列表（仅更新对应数字，但为了简单重新渲染全部）
                    // 也可以只改DOM，但为了排行榜一致，重新加载数据
                    await loadData(); // 重新加载确保排行榜、总计刷新

                } catch (err) {
                    alert('操作失败：' + err.message);
                }
            }

            // 打开密码模态框
            settingsBtn.addEventListener('click', () => {
                passwordInput.value = '';
                passwordModal.classList.add('active');
            });

            // 取消密码
            cancelPwdBtn.addEventListener('click', () => {
                passwordModal.classList.remove('active');
            });

            // 提交密码
            submitPwdBtn.addEventListener('click', () => {
                const pwd = passwordInput.value;
                if (pwd === ADMIN_PASSWORD) {
                    isAdmin = true;
                    adminBadge.style.display = 'inline-block';
                    passwordModal.classList.remove('active');
                    peopleListEl.classList.add('edit-mode');
                    loadData(); // 刷新以应用编辑样式
                } else {
                    alert('密码错误');
                }
            });

            // 点击外部也可关闭模态框（简单处理）
            passwordModal.addEventListener('click', (e) => {
                if (e.target === passwordModal) {
                    passwordModal.classList.remove('active');
                }
            });

            // 登出管理员（可选，可隐藏）
            function logoutAdmin() {
                isAdmin = false;
                adminBadge.style.display = 'none';
                peopleListEl.classList.remove('edit-mode');
                // 不需要重新加载数据
            }

            // 监听列表点击
            peopleListEl.addEventListener('click', handlePersonClick);

            // 初始化加载
            loadData();

            // 可选：添加键盘支持，按ESC退出管理（但不强制）
            window.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && isAdmin) {
                    logoutAdmin();
                }
            });

        })();
    </script>
</body>
</html>
